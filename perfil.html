<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFUEX - Perfil y Ajustes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght=0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-out': 'fadeOut 0.25s ease-in forwards'
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .tab-content.hiding { display: block; animation: fadeOut 0.25s ease-in forwards; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-[#0b0f19] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            
            <div class="flex items-center gap-2">
                <span class="text-xl">🚀</span>
                <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-400">CAFUEX</h1>
            </div>

            <nav class="hidden md:flex items-center gap-1">
                <a href="dashboard.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Inicio</a>
                <a href="checklist.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Checklist</a>
                <a href="direccion.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Directorio</a>
                <a href="perfil.html" class="px-3 py-2 rounded-xl text-sm font-bold bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400">Mi Perfil</a>
            </nav>
            
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition text-sm">
                    🌙
                </button>
                
                <button onclick="toggleMobileMenu()" class="md:hidden p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <svg id="menu-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-3 space-y-1">
            <a href="dashboard.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Inicio</a>
            <a href="checklist.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Checklist</a>
            <a href="direccion.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Directorio</a>
            <a href="perfil.html" class="block px-4 py-2.5 rounded-xl text-sm font-bold bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400">Mi Perfil</a>
        </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8 animate-fade-in-up">
        
        <div class="mb-6">
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Mi Perfil</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Configura tus datos de cuenta y preferencias de acceso técnico.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-6">
            
            <aside class="w-full md:w-64 flex md:flex-col gap-1 overflow-x-auto md:overflow-x-visible pb-3 md:pb-0 scrollbar-none border-b md:border-b-0 md:border-r border-slate-200 dark:border-slate-800 shrink-0 whitespace-nowrap">
                <button onclick="switchTab('cuenta', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 transition">
                    👤 Cuenta
                </button>
                <button onclick="switchTab('seguridad', this)" class="tab-btn px-4 py-2.5 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition">
                    🔒 Seguridad
                </button>
            </aside>

            <section class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                
                <div id="tab-cuenta" class="tab-content active space-y-4">
                    <h3 class="text-sm font-bold text-slate-900 dark:text-white mb-2 uppercase tracking-wider text-indigo-600 dark:text-indigo-400">Información del Asesor</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                        <div>
                            <label class="block font-bold text-slate-400 uppercase tracking-wide mb-1">Nombre Completo</label>
                            <input type="text" class="w-full border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-slate-50 dark:bg-slate-950/60 outline-none" value="Asesor Operativo CAFUEX" readonly>
                        </div>
                        <div>
                            <label class="block font-bold text-slate-400 uppercase tracking-wide mb-1">Correo Institucional</label>
                            <input type="email" class="w-full border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-slate-50 dark:bg-slate-950/60 outline-none" value="asesor@cafuex.com" readonly>
                        </div>
                    </div>
                </div>

                <div id="tab-seguridad" class="tab-content space-y-4">
                    <h3 class="text-sm font-bold text-slate-900 dark:text-white mb-2 uppercase tracking-wider text-indigo-600 dark:text-indigo-400">Seguridad de Acceso</h3>
                    <div class="space-y-3 max-w-sm text-xs">
                        <div>
                            <label class="block font-bold text-slate-400 uppercase tracking-wide mb-1">Contraseña Actual</label>
                            <input type="password" class="w-full border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-white dark:bg-slate-950 outline-none focus:border-indigo-500 transition" placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block font-bold text-slate-400 uppercase tracking-wide mb-1">Nueva Contraseña</label>
                            <input type="password" class="w-full border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-white dark:bg-slate-950 outline-none focus:border-indigo-500 transition" placeholder="Mínimo 8 caracteres">
                        </div>
                        <button onclick="alert('Contraseña actualizada con éxito.')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2.5 rounded-xl transition shadow-md mt-2">
                            Actualizar Credenciales
                        </button>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <script>
        // Control menú móvil
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            } else {
                menu.classList.add('hidden');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
            }
        }

        // Lógica Fluida de Intercambio de Pestañas (Asíncrona)
        function switchTab(tabId, btnElement) {
            const currentActive = document.querySelector('.tab-content.active');
            const newActive = document.getElementById('tab-' + tabId);

            if (currentActive === newActive) return;

            if (currentActive) {
                currentActive.classList.add('hiding');
                currentActive.classList.remove('active');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn px-4 py-2.5 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition';
            });
            btnElement.className = 'tab-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 transition';

            setTimeout(() => {
                if (currentActive) currentActive.classList.remove('hiding');
                newActive.classList.add('active');
            }, 250);
        }

        // Control del Tema Claro / Oscuro
        const themeToggleBtn = document.getElementById('theme-toggle');
        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleBtn.innerText = '☀️';
            } else {
                themeToggleBtn.innerText = '🌙';
            }
        }
        updateThemeIcon();

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function () {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();
            });
        }
    </script>
</body>
</html>
