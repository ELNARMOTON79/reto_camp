<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFUEX - Retroalimentación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght=0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-[#0b0f19] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            
            <div class="flex items-center gap-2">
                <span class="text-xl">🚀</span>
                <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-400">CAFUEX</h1>
            </div>

            <nav class="hidden md:flex items-center gap-1">
                <a href="dashboard.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Inicio</a>
                <a href="checklist.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Checklist</a>
                <a href="direccion.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Directorio</a>
                <a href="perfil.html" class="px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Mi Perfil</a>
            </nav>
            
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition text-sm">
                    🌙
                </button>
                
                <button onclick="toggleMobileMenu()" class="md:hidden p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <svg id="menu-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-3 space-y-1">
            <a href="dashboard.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Inicio</a>
            <a href="checklist.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Checklist</a>
            <a href="direccion.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Directorio</a>
            <a href="perfil.html" class="block px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50">Mi Perfil</a>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-8 animate-fade-in-up">
        
        <div class="mb-6">
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Retroalimentación</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Revisa tus métricas de rendimiento y comentarios de supervisión.</p>
        </div>

        <section class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm space-y-6">
            
            <div>
                <h3 class="text-sm font-bold text-slate-900 dark:text-white mb-3 uppercase tracking-wider text-indigo-600 dark:text-indigo-400">Evaluación General</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="p-4 border border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50 dark:bg-slate-950/40">
                        <span class="text-xs text-slate-400 font-medium">Calificación del Mes</span>
                        <h4 class="text-xl font-black text-slate-800 dark:text-white mt-0.5">9.2 / 10</h4>
                    </div>
                    <div class="p-4 border border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50 dark:bg-slate-950/40">
                        <span class="text-xs text-slate-400 font-medium">Estado del Desempeño</span>
                        <h4 class="text-xl font-black text-emerald-600 dark:text-emerald-400 mt-0.5">Sobresaliente</h4>
                    </div>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Comentarios del Supervisor</label>
                <textarea class="w-full border border-slate-200 dark:border-slate-800 rounded-xl p-4 bg-slate-50 dark:bg-slate-950 focus:bg-white dark:focus:bg-slate-900 focus:border-indigo-500 outline-none transition resize-none text-xs text-slate-800 dark:text-slate-200 h-32 leading-relaxed" placeholder="Observaciones detalladas de los supervisores..." readonly>Excelente manejo de los tiempos de respuesta durante las horas pico de esta semana. Se sugiere continuar reforzando el registro de actividades en la checklist diaria de forma oportuna.</textarea>
            </div>

            <div class="flex justify-end pt-2">
                <button onclick="alert('Retroalimentación firmada digitalmente.')" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-5 py-3 rounded-xl shadow-md transition active:scale-[0.98]">
                    ✓ Entendido y Conforme
                </button>
            </div>

        </section>
    </main>

    <script>
        // Control menú móvil
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            } else {
                menu.classList.add('hidden');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
            }
        }

        // Control del Tema Claro / Oscuro
        const themeToggleBtn = document.getElementById('theme-toggle');
        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleBtn.innerText = '☀️';
            } else {
                themeToggleBtn.innerText = '🌙';
            }
        }
        updateThemeIcon();

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function () {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();
            });
        }
    </script>
</body>
</html>
