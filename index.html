<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFUEX - Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght=0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Cargar tema inicial e icono básico
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-center items-center p-4 transition-colors duration-300">

    <div class="absolute top-4 right-4">
        <button id="theme-toggle" class="p-3 rounded-xl bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition shadow-sm text-lg">
            🌙
        </button>
    </div>

    <main class="w-full max-w-md bg-white dark:bg-slate-900/60 p-8 rounded-3xl border border-slate-200 dark:border-slate-800/80 shadow-xl backdrop-blur-md animate-fade-in-up">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-600 text-white text-2xl font-black shadow-lg shadow-indigo-500/30 mb-4">
                CX
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-400">
                Bienvenido a CAFUEX
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Plataforma interna para asesores</p>
        </div>

        <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Correo Electrónico</label>
                <input type="email" required placeholder="tu@cafuex.com" 
                    class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition duration-200">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Contraseña</label>
                <input type="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition duration-200">
            </div>

            <div class="flex items-center justify-between text-sm pt-1">
                <label class="flex items-center gap-2 cursor-pointer select-none text-slate-600 dark:text-slate-400">
                    <input type="checkbox" class="rounded border-slate-300 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500/30 bg-slate-50 dark:bg-slate-800">
                    <span>Recordarme</span>
                </label>
                <a href="#" class="font-semibold text-indigo-600 dark:text-indigo-400 hover:underline transition">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit"
                class="w-full mt-2 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-indigo-500/25 dark:shadow-indigo-500/10 transition active:scale-[0.98]">
                Entrar
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-800/60 pt-4">
            ¿No tienes cuenta? <a href="#" class="font-bold text-indigo-600 dark:text-indigo-400 hover:underline transition">Contacta con administración</a>
        </div>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        
        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleBtn.innerText = '☀️';
            } else {
                themeToggleBtn.innerText = '🌙';
            }
        }

        // Inicializar icono correcto al cargar la página
        updateThemeIcon();

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();
            });
        }
    </script>
</body>
</html>
