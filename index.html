<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFUEX - Iniciar sesión</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Cargar tema inicial
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        pulseGlow: {
                            '0%': { boxShadow: '0 0 5px rgba(99, 102, 241, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.5)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', Inter, system-ui, sans-serif;
        }
        * {
            transition-property: background-color, border-color, text-color, fill, stroke;
            transition-duration: 200ms;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-50 via-indigo-50/20 to-slate-100 dark:from-[#0b0f19] dark:via-[#111827] dark:to-[#1e1b4b] overflow-hidden relative">
    
    <!-- Background Auras -->
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-indigo-600/10 dark:bg-indigo-600/10 blur-[100px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-violet-600/10 dark:bg-violet-600/10 blur-[100px] pointer-events-none"></div>

    <!-- Floating Theme Switcher -->
    <div class="absolute top-6 right-6 z-20">
        <button id="theme-toggle" class="p-3 rounded-2xl border border-slate-200/80 dark:border-slate-800/80 bg-white/90 dark:bg-slate-900/60 backdrop-blur-xl hover:bg-slate-50 dark:hover:bg-slate-800/80 text-slate-600 dark:text-slate-400 shadow-lg shadow-indigo-950/5 transition">
            <span class="hidden dark:block">☀️</span>
            <span class="block dark:hidden">🌙</span>
        </button>
    </div>

    <!-- Login Container -->
    <main class="w-full max-w-md rounded-3xl border border-slate-200/80 dark:border-slate-800/80 bg-white/90 dark:bg-slate-900/60 backdrop-blur-xl p-8 shadow-2xl shadow-indigo-950/5 dark:shadow-indigo-950/40 relative z-10 animate-fade-in-up">
        
        <!-- Logo & Header -->
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white font-extrabold text-2xl shadow-lg shadow-indigo-500/30 mb-4">
                C
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">CAFUEX</h1>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Ingresa tus datos para acceder al portal interno.</p>
        </div>

        <!-- Form -->
        <form class="space-y-5" action="dashboard.html">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Correo electrónico</label>
                <input id="email" type="email" placeholder="tucorreo@cafuex.com"
                    class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 px-4 py-3 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 outline-none transition focus:border-indigo-500 dark:focus:border-indigo-400 focus:bg-white dark:focus:bg-slate-950/80 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-500/10"
                    required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Contraseña</label>
                <input id="password" type="password" placeholder="••••••••"
                    class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 px-4 py-3 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 outline-none transition focus:border-indigo-500 dark:focus:border-indigo-400 focus:bg-white dark:focus:bg-slate-950/80 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-500/10"
                    required>
            </div>
            
            <div class="flex items-center justify-between text-sm text-slate-500 dark:text-slate-400">
                <label class="flex items-center gap-2 cursor-pointer select-none">
                    <input type="checkbox"
                        class="h-4 w-4 rounded border-slate-300 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-indigo-600 focus:ring-indigo-500 focus:ring-offset-white dark:focus:ring-offset-slate-950">
                    Recordarme
                </label>
                <a href="#" class="font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit"
                class="w-full rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-indigo-500/25 dark:shadow-indigo-500/10 transition active:scale-[0.98]">
                Entrar
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
            ¿No tienes cuenta? <a href="#" class="font-bold text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition">Contacta con administración</a>
        </div>
    </main>

    <!-- Theme toggle Script -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }
    </script>
</body>

</html>
