<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuencor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, system-ui, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 via-red-100 to-red-200 text-gray-900">
    <header class="bg-white/90 backdrop-blur border-b border-red-200 shadow-sm sticky top-0 z-20">
        <div class="mx-auto max-w-6xl px-6 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <a href="index.html" class="text-2xl font-semibold text-red-700">Fuencor</a>
                <p class="text-sm text-red-500 opacity-90">Propiedades con estilo y confianza</p>
            </div>
            <nav>
                <ul class="flex flex-wrap items-center gap-3 text-sm font-medium text-red-700">
                    <li><a href="index.html" class="px-3 py-2 rounded-lg hover:bg-red-100">Propiedades</a></li>
                    <li><a href="contacto.html" class="px-3 py-2 rounded-lg hover:bg-red-100">Contacto</a></li>
                    <li><a href="aviso.html" class="px-3 py-2 rounded-lg hover:bg-red-100">Aviso de Privacidad</a></li>
                    <li><a href="nosotros.html" class="px-3 py-2 rounded-lg hover:bg-red-100">Nosotros</a></li>
                    <li><a href="portal.html" class="px-3 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">Portal Interno</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-10">
        <section class="grid min-h-[calc(100vh-120px)] place-items-center">
            <div class="w-full max-w-md rounded-3xl border border-red-200/70 bg-white/90 p-8 shadow-2xl shadow-red-200/40 backdrop-blur-xl">
                <div class="mb-8 text-center">
                    <h1 class="mt-4 text-3xl font-semibold text-red-700">Iniciar sesión</h1>
                    <p class="mt-2 text-sm text-gray-500">Ingresa tus datos para acceder al portal interno de Fuencor.</p>
                </div>
                <form class="space-y-6" action="dashboard.html">
                    <div>
                        <label class="block text-sm font-medium text-gray-700" for="email">Correo electrónico</label>
                        <input id="email" type="email" placeholder="tucorreo@empresa.com" class="mt-2 w-full rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-gray-900 outline-none transition focus:border-red-500 focus:bg-white" >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700" for="password">Contraseña</label>
                        <input id="password" type="password" placeholder="********" class="mt-2 w-full rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-gray-900 outline-none transition focus:border-red-500 focus:bg-white" >
                    </div>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="h-4 w-4 rounded border-red-300 text-red-600 focus:ring-red-500">
                            Recordarme
                        </label>
                        <a href="#" class="font-medium text-red-600 hover:text-red-700">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="w-full rounded-2xl bg-red-600 px-4 py-3 text-sm font-semibold text-white shadow-sm shadow-red-300/50 transition hover:bg-red-700">Entrar</button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-500">
                    ¿No tienes cuenta? <a href="#" class="font-semibold text-red-600 hover:text-red-700">Contacta con administración</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
